name: 🛠️ EthicalCheck-Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # Customize trigger events based on your DevSecOps processes.
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '19 11 * * 3'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ethicalcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Trigger_EthicalCheck:
    name: API security baseline scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run OWASP ZAP baseline
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874 # v0.15.0
        with:
          target: "http://netbanking.apisec.ai:8080"
          cmd_options: "-a"
          allow_issue_writing: false
          fail_action: false

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish markdown summary
        if: always()
        run: |
          if [ -f report_md.md ]; then
            cat report_md.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No markdown report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi
