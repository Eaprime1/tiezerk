# Synopsys security scanning (Coverity SAST, Black Duck SCA, or Polaris)
# Requires at least one credential set:
#   Coverity: COVERITY_URL, COVERITY_USER, COVERITY_PASSPHRASE
#   Black Duck: BLACKDUCK_URL, BLACKDUCK_API_TOKEN
#   Polaris: POLARIS_SERVER_URL, POLARIS_ACCESS_TOKEN
# When no credentials are present, this job is skipped automatically.

name: Synopsys Security Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: >-
      ${{
        (secrets.COVERITY_URL != '' && secrets.COVERITY_USER != '' && secrets.COVERITY_PASSPHRASE != '') ||
        (secrets.BLACKDUCK_URL != '' && secrets.BLACKDUCK_API_TOKEN != '') ||
        (secrets.POLARIS_SERVER_URL != '' && secrets.POLARIS_ACCESS_TOKEN != '')
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Synopsys Action
        uses: synopsys-sig/synopsys-action@v1.6.0
        with:
          coverity_url: ${{ secrets.COVERITY_URL }}
          coverity_user: ${{ secrets.COVERITY_USER }}
          coverity_passphrase: ${{ secrets.COVERITY_PASSPHRASE }}
          blackduck_token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          blackduck_url: ${{ secrets.BLACKDUCK_URL }}
          polaris_server_url: ${{ secrets.POLARIS_SERVER_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_assessment_types: "SCA,SAST"
