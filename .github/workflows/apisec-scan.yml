# APIsec API security scanning
# Requires: secrets.APISEC_USERNAME and secrets.APISEC_PASSWORD
# To activate: register at https://cloud.apisec.ai and add credentials as repository secrets.
# When credentials are absent, this job is skipped automatically.

name: APIsec

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '34 21 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Trigger_APIsec_scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.APISEC_USERNAME != '' && secrets.APISEC_PASSWORD != '' }}

    steps:
      - name: APIsec scan
        uses: apisec-inc/apisec-run-scan@025432089674a28ba8fb55f8ab06c10215e772ea
        with:
          apisec-username: ${{ secrets.APISEC_USERNAME }}
          apisec-password: ${{ secrets.APISEC_PASSWORD }}
          apisec-project: "VAmPI"
          sarif-result-file: "apisec-results.sarif"
      - name: Import results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./apisec-results.sarif
